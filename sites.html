<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mis Páginas — Índice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="nav">
    <a href="index.html" class="nav__logo">AC<span class="dot">.</span></a>
    <nav class="nav__links"><a href="index.html">Volver</a></nav>
  </header>

  <main class="section">
    <!-- Botón de volver atrás, apunta directo a index.html -->
    <a href="index.html" class="boton-volver">← Volver al inicio</a>
    <p>Listado ordenado de demos.</p>

    <ol id="projects-list" class="projects-list"></ol>
  </main>

  <script src="projects.js"></script>
  <script>
    const list = document.getElementById('projects-list');
    (window.projects || []).forEach((p, i) => {
      const li = document.createElement('li');
      li.innerHTML = `
        <a href="${p.href}">${(i+1).toString().padStart(2,'0')} ${p.title}</a>
        <div class="small-desc">${p.desc || ''}</div>
      `;
      list.appendChild(li);
    });
  </script>

</body>
</html>
